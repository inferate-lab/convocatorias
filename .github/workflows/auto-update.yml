name: CENTINELA v5.0 — Sincronización Automática

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

# Configuración del entorno de despliegue para GitHub Pages
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  sync:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    # 1. CORRECCIÓN DE PERMISOS (Aquí estaba el bloqueo del token OIDC)
    permissions:
      contents: write
      pages: write      # <--- AGREGAR ESTO: Permite escribir en la web de GitHub Pages
      id-token: write   # <--- AGREGAR ESTO: Permite la autenticación criptográfica segura

    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4.2.1
      with:
        ref: main
        fetch-depth: 0

    - name: ⚙️ Setup Node.js 18
      uses: actions/setup-node@v4.1.0
      with:
        node-version: '18'

    - name: 📦 Instalar dependencias
      run: npm install

    - name: 🧹 Ejecutar purga de vencidas
      run: node purge.js

    - name: ✅ Validar integridad scanner.js
      run: |
        node -e "
          const fs = require('fs');
          const content = fs.readFileSync('scanner.js', 'utf8');
          if (!content.includes('GLOBAL_RADAR')) {
            console.error('❌ GLOBAL_RADAR no encontrado');
            process.exit(1);
          }
          console.log('✅ Validación exitosa: scanner.js íntegro');
        "

    - name: 📝 Configurar git
      run: |
        git config --global user.name 'Antigravity IRIS Agent'
        git config --global user.email 'iris@antigravity.local'

    - name: 💾 Commit cambios
      run: |
        git add .
        git commit -am 'Force Live Update: CSS, Purge, Sur-Sur & Innovation Nodes' || echo "ℹ️ Sin cambios para confirmar"

    - name: 🚀 Push a main
      run: git push origin HEAD:main

    # 2. SECCIÓN DE DESPLIEGUE EN VIVO (Los pasos que faltaban para activar la web)
    - name: 🛠️ Configurar Páginas de GitHub
      uses: actions/configure-pages@v5

    - name: 📦 Subir Artefacto de Producción
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.' # Sube los archivos procesados (index.html, data.json, ruido.json)

    - name: 🚀 Desplegar en GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5 # <--- Ejecuta de forma segura la acción que fallaba

    - name: ✨ Resumen
      if: always()
      run: echo "✅ Ciclo de CENTINELA y Despliegue completado"
