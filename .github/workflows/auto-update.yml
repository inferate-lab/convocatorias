name: CENTINELA v5.0 — Sincronización Automática

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
    - run: npm install node-cron axios
    - run: node purge.js
    - run: |
        git config --global user.name "CENTINELA Bot"
        git config --global user.email "centinela@antigravity.local"
        git add scanner.js
        git commit -m "🤖 CENTINELA v5.0 — Sincronización automática $(date -u +%Y-%m-%d)" || true
        git push
